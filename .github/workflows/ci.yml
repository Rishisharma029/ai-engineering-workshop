name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install All Dependencies
        run: npm run install:all

      - name: Backend - Lint Check
        run: npm run lint --prefix backend
        continue-on-error: true # Allow lint check reporting without blocking during transition

      - name: Backend - Typecheck
        run: npm run typecheck --prefix backend

      - name: Backend - Run Unit & API Tests
        run: npm run test --prefix backend

      - name: Frontend - Lint Check
        run: npm run lint --prefix frontend
        continue-on-error: true

      - name: Frontend - Typecheck
        run: npm run typecheck --prefix frontend

      - name: Frontend - Run Component Tests
        run: npm run test --prefix frontend

      - name: Backend - Production Build
        run: npm run build --prefix backend

      - name: Frontend - Production Build
        run: npm run build --prefix frontend
