name: Security Scan

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Gitleaks needs full history to scan commits

      - name: Run Gitleaks Secret Scanner
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # This will fail the pipeline if secrets are found

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Backend Dependency Security Audit
        run: |
          cd backend
          npm audit --audit-level=high
        continue-on-error: true # Report but don't fail CI on third-party security deprecations

      - name: Frontend Dependency Security Audit
        run: |
          cd frontend
          npm audit --audit-level=high
        continue-on-error: true
